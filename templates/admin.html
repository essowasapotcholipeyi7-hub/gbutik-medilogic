<div class="card">
  <h2>👥 Gestion des vendeurs</h2>
  <div id="adminMessage"></div>
  
  <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px;">
    <input type="text" id="newUsername" placeholder="Nom d'utilisateur" style="padding:10px; border:1px solid #ddd; border-radius:8px;">
    <input type="password" id="newPassword" placeholder="Mot de passe" style="padding:10px; border:1px solid #ddd; border-radius:8px;">
    <input type="text" id="newNom" placeholder="Nom complet" style="padding:10px; border:1px solid #ddd; border-radius:8px;">
  </div>
  <button onclick="ajouterVendeur()" style="width:100%; margin-bottom:30px; background:#28a745; color:white; border:none; border-radius:8px; padding:12px;">➕ Ajouter le vendeur</button>
  
  <h3>📋 Liste des vendeurs</h3>
  <div class="table-container">
    <table>
      <thead><tr><th>ID</th><th>Nom utilisateur</th><th>Nom complet</th><th>Rôle</th><th>Statut</th><th>Action</th></tr></thead>
      <tbody id="vendeursBody"><tr><td colspan="6">Chargement...</td></tr></tbody>
    </table>
  </div>
  
  <h3 style="margin-top:30px;">🔧 Changer mot de passe gérant</h3>
  <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 15px 0;">
    <input type="password" id="ancienMdp" placeholder="Ancien mot de passe" style="padding:10px; border:1px solid #ddd; border-radius:8px;">
    <input type="password" id="nouveauMdp" placeholder="Nouveau mot de passe" style="padding:10px; border:1px solid #ddd; border-radius:8px;">
    <input type="password" id="confirmerMdp" placeholder="Confirmer" style="padding:10px; border:1px solid #ddd; border-radius:8px;">
  </div>
  <button onclick="changerMdpGerant()" style="width:100%; background:#ffc107; color:#333; border:none; border-radius:8px; padding:12px;">🔑 Changer mot de passe</button>
</div>

<style>
  .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid #e5e7eb; max-height: 400px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #1e3a8a; color: white; padding: 10px; }
  td { padding: 8px 10px; border-bottom: 1px solid #e5e7eb; }
</style>

<script>
  function chargerVendeurs() {
    fetch('/api/getAllVendeurs')
      .then(response => response.json())
      .then(data => {
        var tbody = document.getElementById('vendeursBody');
        tbody.innerHTML = '';
        if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="6">Aucun vendeur</td></td>'; return; }
        data.forEach(function(v) {
          var row = tbody.insertRow();
          row.insertCell(0).textContent = v.id || '';
          row.insertCell(1).innerHTML = '<strong>' + (v.username || '-') + '</strong>';
          row.insertCell(2).textContent = v.nom || '';
          row.insertCell(3).textContent = v.role || 'vendeur';
          row.insertCell(4).innerHTML = v.actif ? '<span style="color:#28a745;">✅ Actif</span>' : '<span style="color:#dc3545;">❌ Inactif</span>';
          var btn = document.createElement('button');
          btn.textContent = v.actif ? '🔒 Désactiver' : '✅ Activer';
          btn.style = v.actif ? 'background:#dc3545; color:white; border:none; border-radius:5px; padding:5px 10px; cursor:pointer;' : 'background:#28a745; color:white; border:none; border-radius:5px; padding:5px 10px; cursor:pointer;';
          btn.onclick = (function(id, actif) { return function() { toggleVendeur(id, actif); }; })(v.id, v.actif);
          row.insertCell(5).appendChild(btn);
        });
      });
  }
  
  function ajouterVendeur() {
    var username = document.getElementById('newUsername').value;
    var password = document.getElementById('newPassword').value;
    var nom = document.getElementById('newNom').value;
    if (!username || !password || !nom) { alert('Tous les champs sont requis'); return; }
    fetch('/api/ajouterVendeurWeb', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password, nom: nom })
    })
    .then(response => response.json())
    .then(data => {
      alert(data);
      document.getElementById('newUsername').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('newNom').value = '';
      chargerVendeurs();
    });
  }
  
  function toggleVendeur(id, actif) {
    fetch('/api/desactiverVendeurWeb', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: id, actif: actif })
    })
    .then(response => response.json())
    .then(data => { alert(data); chargerVendeurs(); });
  }
  
  function changerMdpGerant() {
    var ancien = document.getElementById('ancienMdp').value;
    var nouveau = document.getElementById('nouveauMdp').value;
    var confirmer = document.getElementById('confirmerMdp').value;
    if (!ancien || !nouveau) { alert('Veuillez remplir tous les champs'); return; }
    if (nouveau !== confirmer) { alert('Les mots de passe ne correspondent pas'); return; }
    fetch('/api/changerMotDePasseGerantWeb', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ancien: ancien, nouveau: nouveau })
    })
    .then(response => response.json())
    .then(data => {
      alert(data);
      document.getElementById('ancienMdp').value = '';
      document.getElementById('nouveauMdp').value = '';
      document.getElementById('confirmerMdp').value = '';
    });
  }
  
  chargerVendeurs();
</script>
