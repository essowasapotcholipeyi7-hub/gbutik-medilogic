<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBoutik-MediLogic - Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #1e3a8a; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 30px; }
        .role-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .role-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            background: #f5f5f5;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .role-btn.active {
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            color: white;
            border-color: transparent;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .error { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .register-link { text-align: center; margin-top: 20px; }
        .register-link a { color: #1e3a8a; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏪 GBoutik-MediLogic</h1>
        <div class="subtitle">Gestion multi-boutiques</div>
        
        <div id="errorMsg" class="error"></div>
        
        <!-- Choix du rôle -->
        <div class="role-buttons">
            <button id="btnGerant" class="role-btn active" onclick="selectRole('gerant')">👑 Gérant</button>
            <button id="btnVendeur" class="role-btn" onclick="selectRole('vendeur')">👤 Vendeur</button>
        </div>
        
        <!-- Formulaire Gérant -->
        <div id="gerantForm">
            <div class="form-group">
                <label>📧 Email du gérant</label>
                <input type="email" id="email" placeholder="gerant@boutique.com">
            </div>
            <div class="form-group">
                <label>🔑 Mot de passe</label>
                <input type="password" id="password" placeholder="Mot de passe">
            </div>
        </div>
        
        <!-- Formulaire Vendeur -->
        <div id="vendeurForm" style="display:none;">
            <div class="form-group">
                <label>👤 Nom d'utilisateur</label>
                <input type="text" id="vendeurUsername" placeholder="vendeur1">
            </div>
            <div class="form-group">
                <label>🔑 Mot de passe</label>
                <input type="password" id="vendeurPassword" placeholder="Mot de passe">
            </div>
        </div>
        
        <button onclick="seConnecter()">Se connecter</button>
        
        <div class="register-link">
            <a href="/inscription">Créer une boutique</a>
        </div>
    </div>
    
    <script>
        let roleActuel = 'gerant';
        
        function selectRole(role) {
            roleActuel = role;
            const btnGerant = document.getElementById('btnGerant');
            const btnVendeur = document.getElementById('btnVendeur');
            const gerantForm = document.getElementById('gerantForm');
            const vendeurForm = document.getElementById('vendeurForm');
            
            if (role === 'gerant') {
                btnGerant.classList.add('active');
                btnVendeur.classList.remove('active');
                gerantForm.style.display = 'block';
                vendeurForm.style.display = 'none';
            } else {
                btnGerant.classList.remove('active');
                btnVendeur.classList.add('active');
                gerantForm.style.display = 'none';
                vendeurForm.style.display = 'block';
            }
        }
        
        function seConnecter() {
            const errorDiv = document.getElementById('errorMsg');
            
            if (roleActuel === 'gerant') {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                if (!email || !password) {
                    errorDiv.innerHTML = '❌ Veuillez saisir email et mot de passe';
                    errorDiv.style.display = 'block';
                    return;
                }
                
                fetch('/api/connexion_boutique', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = '/dashboard_boutique';
                    } else {
                        errorDiv.innerHTML = '❌ ' + data.error;
                        errorDiv.style.display = 'block';
                    }
                });
            } 
            else {
                const username = document.getElementById('vendeurUsername').value;
                const password = document.getElementById('vendeurPassword').value;
                
                if (!username || !password) {
                    errorDiv.innerHTML = '❌ Veuillez saisir nom d\'utilisateur et mot de passe';
                    errorDiv.style.display = 'block';
                    return;
                }
                
                fetch('/api/connexion_vendeur', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: username, 
                        password: password 
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = '/dashboard_vendeur';
                    } else {
                        errorDiv.innerHTML = '❌ ' + data.error;
                        errorDiv.style.display = 'block';
                    }
                });
            }
        }
        
        // Appuyer sur Entrée pour valider
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') seConnecter();
        });
        document.getElementById('vendeurPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') seConnecter();
        });
    </script>
</body>
</html>
