<div class="card">
  <h2>💰 Vente rapide</h2>
  <div id="venteMessage"></div>
  
  <div style="display: flex; gap: 10px; margin-bottom: 20px;">
    <button id="modeUniqueBtn" onclick="changerMode('unique')" style="flex:1; padding:10px; background:#1e3a8a; color:white; border:none; border-radius:8px;">🛒 Vente unique</button>
    <button id="modeMultipleBtn" onclick="changerMode('multiple')" style="flex:1; padding:10px; background:#6c757d; color:white; border:none; border-radius:8px;">🛍️ Panier</button>
  </div>
  
  <div id="venteUnique">
    <select id="produitSelect" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;" onchange="updatePrix()">
      <option value="">Sélectionnez un produit</option>
    </select>
    <input type="number" id="quantite" placeholder="Quantité" value="1" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
    <input type="number" id="prixVendu" placeholder="Prix vendu" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
    <input type="number" id="remise" placeholder="Remise (FCFA)" value="0" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
    <div style="background:#e0e7ff; padding:15px; border-radius:8px; margin-bottom:10px; text-align:center;">
      <strong>Total: <span id="total">0</span> FCFA</strong>
    </div>
    <button onclick="validerVente()" style="width:100%; padding:12px; background:#28a745; color:white; border:none; border-radius:8px;">✅ Valider la vente</button>
  </div>
  
  <div id="venteMultiple" style="display:none;">
    <select id="produitPanier" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;" onchange="updatePrixPanier()">
      <option value="">Sélectionnez un produit</option>
    </select>
    <input type="number" id="quantitePanier" placeholder="Quantité" value="1" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
    <input type="number" id="prixPanier" placeholder="Prix vendu" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
    <button onclick="ajouterAuPanier()" style="width:100%; padding:10px; background:#17a2b8; color:white; border:none; border-radius:8px; margin-bottom:20px;">➕ Ajouter au panier</button>
    
    <div id="panierList" style="border-top:1px solid #ddd; padding-top:15px;"></div>
    
    <div style="background:#e0e7ff; padding:15px; border-radius:8px; margin:10px 0; text-align:center;">
      <strong>Total panier: <span id="totalPanier">0</span> FCFA</strong>
    </div>
    <input type="number" id="remiseGlobale" placeholder="Remise globale" value="0" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
    <button onclick="validerPanier()" style="width:100%; padding:12px; background:#28a745; color:white; border:none; border-radius:8px;">✅ Valider tout le panier</button>
    <button onclick="viderPanier()" style="width:100%; margin-top:10px; padding:10px; background:#dc3545; color:white; border:none; border-radius:8px;">🗑️ Vider le panier</button>
  </div>
</div>

<script>
  let produits = [];
  let panier = [];
  let mode = 'unique';
  
  function chargerProduits() {
    fetch('/api/getProduitsPourWeb')
      .then(response => response.json())
      .then(data => {
        produits = data;
        var select = document.getElementById('produitSelect');
        var selectPanier = document.getElementById('produitPanier');
        select.innerHTML = '<option value="">Sélectionnez un produit</option>';
        selectPanier.innerHTML = '<option value="">Sélectionnez un produit</option>';
        data.forEach(function(p) {
          var opt = document.createElement('option');
          opt.value = p.nom;
          opt.textContent = p.nom + ' (Stock: ' + p.stock + ')';
          select.appendChild(opt.cloneNode(true));
          selectPanier.appendChild(opt);
        });
      });
  }
  
  function updatePrix() {
    var produit = document.getElementById('produitSelect').value;
    var p = produits.find(function(x) { return x.nom === produit; });
    if (p) document.getElementById('prixVendu').value = p.prixFixe;
    calculerTotal();
  }
  
  function updatePrixPanier() {
    var produit = document.getElementById('produitPanier').value;
    var p = produits.find(function(x) { return x.nom === produit; });
    if (p) document.getElementById('prixPanier').value = p.prixFixe;
    calculerSousTotalPanier();
  }
  
  function calculerTotal() {
    var qte = parseInt(document.getElementById('quantite').value) || 0;
    var prix = parseFloat(document.getElementById('prixVendu').value) || 0;
    var remise = parseFloat(document.getElementById('remise').value) || 0;
    var total = (qte * prix) - remise;
    document.getElementById('total').innerHTML = total > 0 ? total.toLocaleString() : 0;
  }
  
  function calculerSousTotalPanier() {
    var qte = parseInt(document.getElementById('quantitePanier').value) || 0;
    var prix = parseFloat(document.getElementById('prixPanier').value) || 0;
    document.getElementById('sousTotalPanier').innerHTML = (qte * prix).toLocaleString();
  }
  
  function validerVente() {
    var produit = document.getElementById('produitSelect').value;
    var quantite = parseInt(document.getElementById('quantite').value);
    var prixVendu = parseFloat(document.getElementById('prixVendu').value);
    var remise = parseFloat(document.getElementById('remise').value);
    var total = (quantite * prixVendu) - remise;
    
    fetch('/api/validerVenteWeb', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ produit: produit, quantite: quantite, prixVendu: prixVendu, remise: remise, totalNet: total })
    })
    .then(response => response.json())
    .then(data => {
      document.getElementById('venteMessage').innerHTML = '<div style="background:#d4edda; padding:10px; border-radius:8px;">' + data + '</div>';
      document.getElementById('produitSelect').value = '';
      document.getElementById('quantite').value = 1;
      document.getElementById('remise').value = 0;
      chargerProduits();
      setTimeout(function() { document.getElementById('venteMessage').innerHTML = ''; }, 3000);
    });
  }
  
  function ajouterAuPanier() {
    var produit = document.getElementById('produitPanier').value;
    var quantite = parseInt(document.getElementById('quantitePanier').value);
    var prix = parseFloat(document.getElementById('prixPanier').value);
    if (!produit) return;
    
    var existant = panier.find(function(i) { return i.produit === produit; });
    if (existant) { existant.quantite += quantite; existant.total = existant.quantite * existant.prix; }
    else { panier.push({ produit: produit, quantite: quantite, prix: prix, total: quantite * prix }); }
    
    afficherPanier();
    document.getElementById('produitPanier').value = '';
    document.getElementById('quantitePanier').value = 1;
  }
  
  function afficherPanier() {
    var container = document.getElementById('panierList');
    var total = 0;
    container.innerHTML = '';
    panier.forEach(function(item, idx) {
      total += item.total;
      container.innerHTML += '<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #ddd;"><span>' + item.produit + ' x' + item.quantite + '</span><span>' + item.total.toLocaleString() + ' FCFA</span><button onclick="retirerDuPanier(' + idx + ')" style="background:#dc3545; color:white; border:none; border-radius:5px; padding:2px 8px;">🗑️</button></div>';
    });
    document.getElementById('totalPanier').innerHTML = total.toLocaleString();
  }
  
  function retirerDuPanier(idx) { panier.splice(idx, 1); afficherPanier(); }
  function viderPanier() { panier = []; afficherPanier(); }
  
  function validerPanier() {
    var remise = parseFloat(document.getElementById('remiseGlobale').value) || 0;
    fetch('/api/validerPanierWeb', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ panier: panier, remiseGlobale: remise })
    })
    .then(response => response.json())
    .then(data => {
      document.getElementById('venteMessage').innerHTML = '<div style="background:#d4edda; padding:10px; border-radius:8px;">' + data + '</div>';
      panier = [];
      afficherPanier();
      chargerProduits();
      setTimeout(function() { document.getElementById('venteMessage').innerHTML = ''; }, 3000);
    });
  }
  
  function changerMode(nouveauMode) {
    mode = nouveauMode;
    if (mode === 'unique') {
      document.getElementById('venteUnique').style.display = 'block';
      document.getElementById('venteMultiple').style.display = 'none';
      document.getElementById('modeUniqueBtn').style.background = '#1e3a8a';
      document.getElementById('modeMultipleBtn').style.background = '#6c757d';
    } else {
      document.getElementById('venteUnique').style.display = 'none';
      document.getElementById('venteMultiple').style.display = 'block';
      document.getElementById('modeUniqueBtn').style.background = '#6c757d';
      document.getElementById('modeMultipleBtn').style.background = '#1e3a8a';
    }
  }
  
  document.getElementById('quantite').addEventListener('input', calculerTotal);
  document.getElementById('prixVendu').addEventListener('input', calculerTotal);
  document.getElementById('remise').addEventListener('input', calculerTotal);
  
  chargerProduits();
</script>
