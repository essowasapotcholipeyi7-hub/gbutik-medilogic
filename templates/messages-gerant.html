<div class="card">
  <h2>💬 Messagerie - Gérant</h2>
  <div id="messageResult"></div>
  
  <div style="display: flex; gap: 10px; margin-bottom: 20px;">
    <button onclick="ouvrirNouveauMessage()" style="background:#10b981; color:white; border:none; border-radius:8px; padding:10px 20px;">✏️ Nouveau message</button>
    <button onclick="chargerMessages()" style="background:#17a2b8; color:white; border:none; border-radius:8px; padding:10px 20px;">🔄 Actualiser</button>
  </div>
  
  <div style="display: flex; gap: 15px; margin-bottom: 20px;">
    <div style="background: #1e3a8a; color: white; padding: 15px; border-radius: 15px; flex:1; text-align:center;"><h3 id="nbNonLus">0</h3><p>Messages non lus</p></div>
    <div style="background: #1e3a8a; color: white; padding: 15px; border-radius: 15px; flex:1; text-align:center;"><h3 id="nbTotal">0</h3><p>Total messages</p></div>
  </div>
  
  <div class="table-container">
    <table>
      <thead><tr><th>Date</th><th>Heure</th><th>De</th><th>Message</th><th>Statut</th><th>Action</th></tr></thead>
      <tbody id="messagesBody"><tr><td colspan="6">Chargement...</td></tr></tbody>
    </table>
  </div>
</div>

<!-- Modal nouveau message -->
<div id="modalMessage" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
  <div style="background:white; border-radius:20px; padding:25px; width:90%; max-width:500px;">
    <h3>✏️ Nouveau message</h3>
    <input type="text" id="destinataire" placeholder="Nom du vendeur" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:8px;">
    <textarea id="messageGerant" rows="4" placeholder="Votre message..." style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:8px;"></textarea>
    <div style="display:flex; gap:10px; margin-top:15px;">
      <button onclick="envoyerMessageGerant()" style="flex:1; background:#28a745; color:white; border:none; border-radius:8px; padding:10px;">✅ Envoyer</button>
      <button onclick="fermerModal()" style="flex:1; background:#6c757d; color:white; border:none; border-radius:8px; padding:10px;">❌ Annuler</button>
    </div>
  </div>
</div>

<style>
  .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid #e5e7eb; max-height: 500px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #1e3a8a; color: white; padding: 12px; position: sticky; top: 0; }
  td { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; }
  .status-lu { color: #28a745; font-weight: bold; }
  .status-non-lu { color: #f59e0b; font-weight: bold; }
</style>

<script>
  function chargerMessages() {
    fetch('/api/getMessages')
      .then(response => response.json())
      .then(messages => {
        var tbody = document.getElementById('messagesBody');
        var nonLus = 0;
        tbody.innerHTML = '';
        if (!messages || messages.length === 0) { tbody.innerHTML = '<tr><td colspan="6">Aucun message</td></td>'; }
        messages.forEach(function(m) {
          if (m.lu !== 'OUI') nonLus++;
          var row = tbody.insertRow();
          row.insertCell(0).textContent = m.date || '';
          row.insertCell(1).textContent = m.heure || '';
          row.insertCell(2).innerHTML = '<strong>' + (m.de || '-') + '</strong>';
          row.insertCell(3).innerHTML = '<div style="max-width:250px; overflow-wrap:break-word;">' + (m.message || '') + '</div>';
          row.insertCell(4).innerHTML = m.lu === 'OUI' ? '<span class="status-lu">✅ Lu</span>' : '<span class="status-non-lu">⏳ Non lu</span>';
          var btn = document.createElement('button');
          btn.textContent = '✏️ Répondre';
          btn.style = 'background:#10b981; color:white; border:none; border-radius:5px; padding:5px 10px; cursor:pointer;';
          btn.onclick = (function(vendeur, msg) { return function() { ouvrirReponse(vendeur, msg); }; })(m.de, m.message);
          row.insertCell(5).appendChild(btn);
        });
        document.getElementById('nbNonLus').innerHTML = nonLus;
        document.getElementById('nbTotal').innerHTML = messages.length;
      });
  }
  
  function ouvrirReponse(vendeur, messageOriginal) {
    document.getElementById('destinataire').value = vendeur;
    document.getElementById('messageGerant').value = '';
    document.getElementById('modalMessage').style.display = 'flex';
  }
  
  function ouvrirNouveauMessage() {
    document.getElementById('destinataire').value = '';
    document.getElementById('messageGerant').value = '';
    document.getElementById('modalMessage').style.display = 'flex';
  }
  
  function fermerModal() {
    document.getElementById('modalMessage').style.display = 'none';
  }
  
  function envoyerMessageGerant() {
    var destinataire = document.getElementById('destinataire').value;
    var message = document.getElementById('messageGerant').value;
    if (!destinataire || !message) { alert('Veuillez remplir tous les champs'); return; }
    fetch('/api/envoyerMessage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: message, expediteur: 'Gérant', destinataire: destinataire })
    })
    .then(response => response.json())
    .then(data => {
      alert(data);
      fermerModal();
      chargerMessages();
    });
  }
  
  chargerMessages();
  setInterval(chargerMessages, 30000);
</script>
