<div class="card">
    <h2>📊 Caisse journalière - {{ session.boutique_nom if session.boutique_nom else 'Ma boutique' }}</h2>
    <div id="caisseMessage"></div>
    
    <div class="total-jour">
        <div>TOTAL DES VENTES AUJOURD'HUI</div>
        <div class="montant" id="totalVentesJour">0 FCFA</div>
        <div id="dateJour"></div>
    </div>
    
    <div class="stats">
        <div class="stat-card"><h3 id="nbVentesJour">0</h3><p>Ventes</p></div>
        <div class="stat-card"><h3 id="nbProduitsVendusJour">0</h3><p>Produits vendus</p></div>
        <div class="stat-card"><h3 id="remiseTotaleJour">0</h3><p>Remises (FCFA)</p></div>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Heure</th><th>Produit</th><th>Qté</th><th>Prix vendu</th><th>Total net</th><th>Vendeur</th>
                </tr>
            </thead>
            <tbody id="caisseJourBody">
                <tr><td colspan="6">Chargement...<\/td><\/tr>
            </tbody>
        </table>
    </div>
    
    <div style="margin-top: 20px; text-align: center;">
        <button onclick="chargerCaisse()" style="background:#17a2b8; color:white; border:none; border-radius:8px; padding:10px 20px; cursor:pointer;">🔄 Actualiser</button>
    </div>
    
    <div style="margin-top: 20px; text-align: center;">
        <a href="{% if user_role == 'vendeur' %}/dashboard_vendeur{% else %}/dashboard_boutique{% endif %}" style="background:#6c757d; color:white; padding:12px 30px; border-radius:8px; text-decoration:none; display:inline-block;">
            ← Retour au tableau de bord
        </a>
    </div>
</div>

<style>
    .total-jour { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); color: white; border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 20px; }
    .montant { font-size: 48px; font-weight: bold; margin: 15px 0; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
    .stat-card { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); color: white; padding: 15px; border-radius: 15px; text-align: center; }
    .stat-card h3 { font-size: 28px; margin-bottom: 5px; }
    .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid #e5e7eb; max-height: 400px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #1e3a8a; color: white; padding: 12px; position: sticky; top: 0; }
    td { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; }
    .card { max-width: 1000px; margin: 20px auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    h2 { color: #1e3a8a; margin-bottom: 20px; text-align: center; }
</style>

<script>
    function chargerCaisse() {
        fetch('/api/get_caisse_jour')
            .then(response => response.json())
            .then(data => {
                document.getElementById('totalVentesJour').innerHTML = (data.totalVentes || 0).toLocaleString() + ' FCFA';
                document.getElementById('nbVentesJour').innerHTML = data.nbVentes || 0;
                document.getElementById('nbProduitsVendusJour').innerHTML = data.nbProduitsVendus || 0;
                document.getElementById('remiseTotaleJour').innerHTML = (data.remiseTotale || 0).toLocaleString() + ' FCFA';
                document.getElementById('dateJour').innerHTML = '📅 ' + (data.date || '');
                
                var tbody = document.getElementById('caisseJourBody');
                tbody.innerHTML = '';
                if (!data.ventes || data.ventes.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6">Aucune vente aujourd\'hui<\/td><\/tr>';
                    return;
                }
                
                data.ventes.forEach(function(v) {
                    var row = tbody.insertRow();
                    row.insertCell(0).textContent = v.heure || '';
                    row.insertCell(1).innerHTML = '<strong>' + (v.produit || '') + '</strong>';
                    row.insertCell(2).textContent = v.quantite || 0;
                    row.insertCell(3).textContent = (v.prixVendu || 0).toLocaleString() + ' FCFA';
                    row.insertCell(4).innerHTML = '<strong>' + (v.totalNet || 0).toLocaleString() + ' FCFA</strong>';
                    row.insertCell(5).textContent = v.vendeur || '';
                });
            })
            .catch(error => {
                console.error('Erreur:', error);
                document.getElementById('caisseJourBody').innerHTML = '<tr><td colspan="6">Erreur de chargement<\/td><\/tr>';
            });
    }
    
    chargerCaisse();
    setInterval(chargerCaisse, 30000);
</script>
