<div class="card">
    <!-- En-tête avec bouton retour en haut à droite -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap;">
        <h2>📦 État du stock - {{ session.boutique_nom if session.boutique_nom else 'Ma boutique' }}</h2>
        <a href="/dashboard_boutique" style="background:#6c757d; color:white; padding:8px 20px; border-radius:8px; text-decoration:none;">
            ← Retour
        </a>
    </div>
    
    <div id="stockMessage"></div>
    
    <div style="margin: 20px 0; display: flex; gap: 10px;">
        <input type="text" id="searchInput" placeholder="🔍 Rechercher un produit..." style="flex:1; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
        <button onclick="rechercher()" style="background:#1e3a8a; color:white; border:none; border-radius:8px; padding:10px 20px; cursor:pointer;">🔍</button>
        <button onclick="reinitialiser()" style="background:#6c757d; color:white; border:none; border-radius:8px; padding:10px 20px; cursor:pointer;">❌</button>
    </div>
    
    <div class="stats">
        <div class="stat-card"><h3 id="nbProduits">0</h3><p>Produits</p></div>
        <div class="stat-card"><h3 id="valeurStock">0</h3><p>Valeur du stock</p></div>
        <div class="stat-card"><h3 id="alertesCount">0</h3><p>Alertes</p></div>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Produit</th><th>Stock actuel</th><th>Seuil</th><th>Statut</th>
                </tr>
            </thead>
            <tbody id="stockBody">
                <tr><td colspan="4">Chargement...<\/td><\/tr>
            </tbody>
        </table>
    </div>
    
    <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
        <button onclick="chargerStock()" style="background:#17a2b8; color:white; border:none; border-radius:8px; padding:10px 20px; cursor:pointer;">🔄 Actualiser</button>
    </div>
</div>

<style>
    .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-bottom: 20px;
    }
    .stat-card {
        background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
        color: white;
        padding: 20px;
        border-radius: 15px;
        text-align: center;
    }
    .stat-card h3 {
        font-size: 28px;
        margin-bottom: 10px;
    }
    .table-container {
        overflow-x: auto;
        border-radius: 12px;
        border: 1px solid #e5e7eb;
        max-height: 500px;
        overflow-y: auto;
    }
    table {
        width: 100%;
        border-collapse: collapse;
    }
    th {
        background: #1e3a8a;
        color: white;
        padding: 12px;
        position: sticky;
        top: 0;
    }
    td {
        padding: 10px 12px;
        border-bottom: 1px solid #e5e7eb;
    }
    .card {
        max-width: 1200px;
        margin: 20px auto;
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    h2 {
        color: #1e3a8a;
        margin: 0;
    }
    .alert-low {
        background-color: #fff3cd;
        color: #856404;
        font-weight: bold;
    }
    .alert-out {
        background-color: #f8d7da;
        color: #721c24;
        font-weight: bold;
    }
    @media (max-width: 768px) {
        .stats {
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .card h2 {
            font-size: 18px;
        }
        .stat-card h3 {
            font-size: 20px;
        }
    }
</style>

<script>
    let tousProduits = [];
    
    function chargerStock() {
        fetch('/api/get_produits')
            .then(response => response.json())
            .then(data => {
                tousProduits = data;
                var totalValeur = data.reduce((sum, p) => sum + (p.prixVente * p.stock), 0);
                var alertes = data.filter(p => p.stock <= p.seuil).length;
                
                document.getElementById('nbProduits').innerHTML = data.length;
                document.getElementById('valeurStock').innerHTML = totalValeur.toLocaleString() + ' FCFA';
                document.getElementById('alertesCount').innerHTML = alertes;
                
                afficher(data);
            });
    }
    
    function afficher(produits) {
        var tbody = document.getElementById('stockBody');
        tbody.innerHTML = '';
        if (produits.length === 0) { 
            tbody.innerHTML = '<tr><td colspan="4">Aucun produit<\/td><\/tr>'; 
            return; 
        }
        
        produits.forEach(function(p) {
            var row = tbody.insertRow();
            var stock = p.stock || 0;
            var seuil = p.seuil || 0;
            var statut = stock <= 0 ? '🔴 RUPTURE' : (stock <= seuil ? '⚠️ ALERTE' : '✅ OK');
            var classe = stock <= 0 ? 'alert-out' : (stock <= seuil ? 'alert-low' : '');
            
            row.insertCell(0).innerHTML = '<strong>' + (p.nom || '-') + '</strong>';
            row.insertCell(1).innerHTML = stock.toLocaleString();
            row.insertCell(2).innerHTML = seuil;
            var cellStatut = row.insertCell(3);
            cellStatut.innerHTML = statut;
            if (classe) cellStatut.className = classe;
        });
    }
    
    function rechercher() {
        var terme = document.getElementById('searchInput').value.toLowerCase();
        if (!terme) { 
            afficher(tousProduits); 
            return; 
        }
        var filtres = tousProduits.filter(p => p.nom && p.nom.toLowerCase().includes(terme));
        afficher(filtres);
    }
    
    function reinitialiser() {
        document.getElementById('searchInput').value = '';
        afficher(tousProduits);
    }
    
    chargerStock();
    setInterval(chargerStock, 60000);
</script>
