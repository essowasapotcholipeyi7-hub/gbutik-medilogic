<div class="card">
    <h2>💬 Messagerie - Gérant</h2>
    <div id="messageResult"></div>
    
    <div class="stats-messages">
        <div class="stat-card"><h3 id="nbNonLus">0</h3><p>Messages non lus</p></div>
        <div class="stat-card"><h3 id="nbTotal">0</h3><p>Total messages</p></div>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Date</th><th>Heure</th><th>De</th><th>Message</th><th>Statut</th><th>Action</th>
                </tr>
            </thead>
            <tbody id="messagesBody">
                <tr><td colspan="6">Chargement...<\/td><\/tr>
            </tbody>
        </table>
    </div>
    
    <div style="margin-top: 20px; text-align: center;">
        <button onclick="chargerMessages()" style="background:#17a2b8; color:white; border:none; border-radius:8px; padding:10px 20px; cursor:pointer;">🔄 Actualiser</button>
    </div>
    
    <div style="margin-top: 20px; text-align: center;">
        <a href="/dashboard_boutique" style="background:#6c757d; color:white; padding:12px 30px; border-radius:8px; text-decoration:none; display:inline-block;">
            ← Retour au tableau de bord
        </a>
    </div>
</div>

<!-- Modal pour répondre -->
<div id="modalReponse" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:20px; padding:25px; width:90%; max-width:500px;">
        <h3>✏️ Répondre au message</h3>
        <div id="reponseInfo" style="background:#f0f0f0; padding:10px; border-radius:8px; margin-bottom:15px;"></div>
        <textarea id="reponseMessage" rows="4" placeholder="Votre réponse..." style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px;"></textarea>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="envoyerReponse()" style="flex:1; background:#28a745; color:white; border:none; border-radius:8px; padding:10px;">✅ Envoyer</button>
            <button onclick="fermerModal()" style="flex:1; background:#6c757d; color:white; border:none; border-radius:8px; padding:10px;">❌ Annuler</button>
        </div>
    </div>
</div>

<style>
    .stats-messages { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
    .stat-card { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); color: white; padding: 20px; border-radius: 15px; text-align: center; }
    .stat-card h3 { font-size: 32px; margin-bottom: 5px; }
    .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid #e5e7eb; max-height: 500px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #1e3a8a; color: white; padding: 12px; position: sticky; top: 0; }
    td { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; }
    .card { max-width: 1000px; margin: 20px auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    h2 { color: #1e3a8a; margin-bottom: 20px; text-align: center; }
    .status-lu { color: #28a745; font-weight: bold; }
    .status-non-lu { color: #f59e0b; font-weight: bold; }
    .btn-repondre { background: #1e3a8a; color: white; border: none; border-radius: 5px; padding: 5px 15px; cursor: pointer; }
</style>

<script>
    let boutique_id = {{ session.boutique_id }};
    let messageEnCours = null;
    
    function chargerMessages() {
        fetch(`/api/get_messages_gerant?boutique_id=${boutique_id}`)
            .then(response => response.json())
            .then(data => {
                var tbody = document.getElementById('messagesBody');
                var nonLus = 0;
                tbody.innerHTML = '';
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6">Aucun message<\/td><\/tr>';
                    document.getElementById('nbNonLus').innerHTML = '0';
                    document.getElementById('nbTotal').innerHTML = '0';
                    return;
                }
                
                data.forEach(function(m) {
                    if (m.lu !== 'OUI') nonLus++;
                    var row = tbody.insertRow();
                    row.insertCell(0).textContent = m.date || '';
                    row.insertCell(1).textContent = m.heure || '';
                    row.insertCell(2).innerHTML = '<strong>' + (m.expediteur || '-') + '</strong>';
                    row.insertCell(3).innerHTML = '<div style="max-width:250px; word-wrap:break-word;">' + (m.message || '') + '</div>';
                    row.insertCell(4).innerHTML = m.lu === 'OUI' ? '<span class="status-lu">✅ Lu</span>' : '<span class="status-non-lu">⏳ Non lu</span>';
                    
                    var btn = document.createElement('button');
                    btn.textContent = '✏️ Répondre';
                    btn.className = 'btn-repondre';
                    btn.onclick = (function(msg) {
                        return function() { ouvrirReponse(msg); };
                    })(m);
                    row.insertCell(5).appendChild(btn);
                });
                
                document.getElementById('nbNonLus').innerHTML = nonLus;
                document.getElementById('nbTotal').innerHTML = data.length;
            });
    }
    
    function ouvrirReponse(message) {
        messageEnCours = message;
        document.getElementById('reponseInfo').innerHTML = `
            <strong>📩 De:</strong> ${message.expediteur}<br>
            <strong>💬 Message:</strong> ${message.message}
        `;
        document.getElementById('reponseMessage').value = '';
        document.getElementById('modalReponse').style.display = 'flex';
        
        // Marquer comme lu
        fetch('/api/marquer_message_lu', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: message.id, boutique_id: boutique_id })
        });
    }
    
    function envoyerReponse() {
        var reponse = document.getElementById('reponseMessage').value.trim();
        if (!reponse) {
            alert('Veuillez écrire une réponse');
            return;
        }
        
        fetch('/api/repondre_message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                id: messageEnCours.id,
                boutique_id: boutique_id,
                destinataire: messageEnCours.expediteur,
                reponse: reponse
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert('✅ Réponse envoyée !');
                fermerModal();
                chargerMessages();
            } else {
                alert('Erreur: ' + data.error);
            }
        });
    }
    
    function fermerModal() {
        document.getElementById('modalReponse').style.display = 'none';
        messageEnCours = null;
    }
    
    chargerMessages();
    setInterval(chargerMessages, 15000);
</script>
