
  <div class="card">
    <h2>📊 Tableau de bord - Gérant</h2>
    <div id="dashboardMessage"></div>
    
    <div class="stats" id="dashboardStats">
      <div class="stat-card">
        <h3 id="caJour">0</h3>
        <p>Chiffre d'affaires aujourd'hui</p>
      </div>
      <div class="stat-card">
        <h3 id="caMois">0</h3>
        <p>Chiffre d'affaires du mois</p>
      </div>
      <div class="stat-card">
        <h3 id="nbProduits">0</h3>
        <p>Produits en stock</p>
      </div>
      <div class="stat-card">
        <h3 id="alertes">0</h3>
        <p>Alertes stock</p>
      </div>
    </div>
    
    <h3 style="margin: 20px 0 10px 0;">⚠️ Produits en alerte</h3>
    <div class="table-container">
      <table id="alertesTable">
        <thead>
          <tr>
            <th>Produit</th>
            <th>Stock restant</th>
            <th>Seuil alerte</th>
            <th>Statut</th>
          </tr>
        </thead>
        <tbody id="alertesBody">
          <tr>
            <td colspan="4" style="text-align: center; padding: 40px;">
              <div class="info-msg">🔄 Chargement des données...</div>
            </td>
          </tr>
        </tbody>
       </table>
    </div>
    
    <button class="btn-refresh" onclick="chargerDashboard()">
      🔄 Actualiser
    </button>
  </div>

  <script>
  console.log("📱 Interface Dashboard chargée");
  
  // Afficher immédiatement des données par défaut (cache local)
  function afficherDonneesParDefaut() {
    document.getElementById('caJour').innerHTML = '... FCFA';
    document.getElementById('caMois').innerHTML = '... FCFA';
    document.getElementById('nbProduits').innerHTML = '...';
    document.getElementById('alertes').innerHTML = '...';
    
    var tbody = document.getElementById('alertesBody');
    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px;"><div class="info-msg">⏳ Chargement rapide...</div></tr>';
  }
  
  // Charger avec timeout pour ne pas bloquer l'UI
  function chargerDashboard() {
    console.log("🔄 Chargement optimisé du dashboard...");
    
    // 1. D'abord, ne pas afficher de message d'attente lourd
    // On laisse les données précédentes ou on met des placeholders légers
    
    // 2. Appel asynchrone avec timeout pour éviter l'attente infinie
    var timeoutId = setTimeout(function() {
      console.warn("⚠️ Timeout dépassé, annulation de la requête");
      var msgDiv = document.getElementById('dashboardMessage');
      msgDiv.innerHTML = '<div class="error-msg">⏱️ Délai dépassé, vérifiez votre connexion</div>';
    }, 5000); // 5 secondes max
    
    google.script.run
      .withSuccessHandler(function(data) {
        clearTimeout(timeoutId);
        console.log("✅ Données reçues en " + (performance.now() - startTime).toFixed(0) + "ms");
        afficherDashboard(data);
        var msgDiv = document.getElementById('dashboardMessage');
        msgDiv.innerHTML = ''; // Efface tout message d'erreur
      })
      .withFailureHandler(function(error) {
        clearTimeout(timeoutId);
        console.error("❌ Erreur:", error);
        var msgDiv = document.getElementById('dashboardMessage');
        msgDiv.innerHTML = '<div class="error-msg">❌ Erreur: ' + error.message + '</div>';
        
        // Garder les données du cache si disponibles
        if (window.cachedData) {
          afficherDashboard(window.cachedData);
        } else {
          // Afficher des valeurs par défaut
          document.getElementById('caJour').innerHTML = '0 FCFA';
          document.getElementById('caMois').innerHTML = '0 FCFA';
          document.getElementById('nbProduits').innerHTML = '0';
          document.getElementById('alertes').innerHTML = '0';
          
          var tbody = document.getElementById('alertesBody');
          tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: red;">❌ Erreur de chargement</tr>';
        }
      })
      .getDashboardStats();
    
    var startTime = performance.now();
  }
  
  // Mise en cache des données pour affichage immédiat au prochain chargement
  function afficherDashboard(data) {
    // Mettre en cache
    window.cachedData = data;
    
    // Afficher les statistiques avec animation fluide
    animateNumber('caJour', data.ca_jour || 0, ' FCFA');
    animateNumber('caMois', data.ca_mois || 0, ' FCFA');
    animateNumber('nbProduits', data.nb_produits || 0, '');
    document.getElementById('alertes').innerHTML = formatNumber(data.alertes || 0);
    
    // Afficher les produits en alerte
    var tbody = document.getElementById('alertesBody');
    tbody.innerHTML = '';
    
    if (data.produits_critiques && data.produits_critiques.length > 0) {
      // Limiter à 10 produits max pour un affichage plus rapide
      var produitsLimit = data.produits_critiques.slice(0, 10);
      for (var i = 0; i < produitsLimit.length; i++) {
        var p = produitsLimit[i];
        var row = tbody.insertRow();
        row.insertCell(0).innerHTML = '<strong>' + escapeHtml(p.produit_nom) + '</strong>';
        row.insertCell(1).innerHTML = p.stock_restant;
        row.insertCell(2).innerHTML = p.seuil_alerte;
        var statusCell = row.insertCell(3);
        statusCell.innerHTML = '⚠️ ALERTE';
        statusCell.className = 'alert-low';
      }
      if (data.produits_critiques.length > 10) {
        var row = tbody.insertRow();
        row.insertCell(0).colSpan = 4;
        row.insertCell(0).innerHTML = '<em>... et ' + (data.produits_critiques.length - 10) + ' autres produits</em>';
      }
    } else {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 40px;"><div class="success-msg">✅ Aucun produit en alerte</div></tr>';
    }
  }
  
  // Animation des nombres pour un effet plus fluide
  function animateNumber(elementId, targetValue, suffix) {
    var element = document.getElementById(elementId);
    var currentValue = parseInt(element.innerHTML.replace(/[^0-9]/g, '')) || 0;
    if (currentValue === targetValue) {
      element.innerHTML = formatNumber(targetValue) + suffix;
      return;
    }
    
    var step = Math.ceil((targetValue - currentValue) / 10);
    var current = currentValue;
    var interval = setInterval(function() {
      current += step;
      if ((step > 0 && current >= targetValue) || (step < 0 && current <= targetValue)) {
        current = targetValue;
        clearInterval(interval);
      }
      element.innerHTML = formatNumber(current) + suffix;
    }, 20);
  }
  
  function formatNumber(number) {
    if (number === undefined || number === null) return '0';
    return number.toLocaleString('fr-FR');
  }
  
  function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
  }
  
  // Chargement IMMÉDIAT avec cache si disponible
  if (window.cachedData) {
    console.log("📦 Utilisation du cache local");
    afficherDashboard(window.cachedData);
  } else {
    // Afficher des placeholders légers (pas de message de chargement lourd)
    document.getElementById('caJour').innerHTML = '<span style="opacity:0.5">⏳</span>';
    document.getElementById('caMois').innerHTML = '<span style="opacity:0.5">⏳</span>';
    document.getElementById('nbProduits').innerHTML = '<span style="opacity:0.5">⏳</span>';
    document.getElementById('alertes').innerHTML = '<span style="opacity:0.5">⏳</span>';
  }
  
  // Lancer le chargement réel
  chargerDashboard();
  
  // Rafraîchir toutes les 60 secondes (au lieu de 30) pour moins solliciter
  setInterval(chargerDashboard, 60000);
</script>
</body>
</html>
