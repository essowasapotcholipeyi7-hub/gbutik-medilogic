<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBoutik-MediLogic - Inscription Boutique</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #1e3a8a; margin-bottom: 10px; }
        h2 { text-align: center; color: #666; font-size: 14px; margin-bottom: 30px; font-weight: normal; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; font-size: 14px; }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        textarea { resize: vertical; }
        .row {
            display: flex;
            gap: 15px;
        }
        .row .form-group {
            flex: 1;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .error { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .success { background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .login-link { text-align: center; margin-top: 20px; }
        .login-link a { color: #1e3a8a; text-decoration: none; }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏪 GBoutik-MediLogic</h1>
        <h2>Créer votre espace boutique</h2>
        
        <div id="errorMsg" class="error"></div>
        <div id="successMsg" class="success"></div>
        
        <!-- Section Boutique -->
        <h3 style="margin-bottom: 15px; color: #1e3a8a;">🏢 Informations de la boutique</h3>
        
        <div class="form-group">
            <label>Nom de la boutique *</label>
            <input type="text" id="nom_boutique" placeholder="Ex: Boutique Du Coin">
        </div>
        
        <div class="form-group">
            <label>📍 Adresse</label>
            <textarea id="adresse" rows="2" placeholder="Adresse de la boutique"></textarea>
        </div>
        
        <hr>
        
        <!-- Section Propriétaire -->
        <h3 style="margin-bottom: 15px; color: #1e3a8a;">👤 Informations du propriétaire</h3>
        
        <div class="row">
            <div class="form-group">
                <label>Nom *</label>
                <input type="text" id="proprietaire_nom" placeholder="Votre nom">
            </div>
            <div class="form-group">
                <label>Prénom *</label>
                <input type="text" id="proprietaire_prenom" placeholder="Votre prénom">
            </div>
        </div>
        
        <div class="form-group">
            <label>📧 Email *</label>
            <input type="email" id="email" placeholder="gerant@boutique.com">
        </div>
        
        <div class="form-group">
            <label>📞 Téléphone *</label>
            <input type="tel" id="telephone" placeholder="Ex: 90XX XX XX">
        </div>
        
        <hr>
        
        <!-- Section Sécurité -->
        <h3 style="margin-bottom: 15px; color: #1e3a8a;">🔒 Sécurité</h3>
        
        <div class="form-group">
            <label>🔑 Mot de passe *</label>
            <input type="password" id="password" placeholder="Minimum 8 caractères" onkeyup="checkPasswordStrength()">
            <div id="passwordStrength" class="mt-1" style="font-size: 12px;"></div>
        </div>
        
        <div class="form-group">
            <label>🔑 Confirmer le mot de passe *</label>
            <input type="password" id="confirm_password" placeholder="" onkeyup="checkPasswordMatch()">
            <div id="passwordMatch" class="mt-1" style="font-size: 12px;"></div>
        </div>
        
        <div class="alert alert-info" style="background: #e0e7ff; padding: 12px; border-radius: 8px; margin: 15px 0; font-size: 13px;">
            <i class="fas fa-info-circle"></i> 
            Une fois inscrit, votre boutique sera en attente d'activation par l'administrateur.
        </div>
        
        <button onclick="inscrire()">Créer ma boutique</button>
        
        <div class="login-link">
            <a href="/login_page">Déjà inscrit ? Se connecter</a>
        </div>
    </div>
    
    <script>
        function checkPasswordStrength() {
            var password = document.getElementById('password').value;
            var strengthDiv = document.getElementById('passwordStrength');
            
            if (password.length === 0) {
                strengthDiv.innerHTML = '';
                return;
            }
            
            if (password.length < 8) {
                strengthDiv.innerHTML = '<span style="color: #dc3545;">❌ Minimum 8 caractères requis</span>';
            } else {
                strengthDiv.innerHTML = '<span style="color: #28a745;">✅ Longueur valide (8+ caractères)</span>';
            }
        }
        
        function checkPasswordMatch() {
            var password = document.getElementById('password').value;
            var confirm = document.getElementById('confirm_password').value;
            var matchDiv = document.getElementById('passwordMatch');
            
            if (confirm.length === 0) {
                matchDiv.innerHTML = '';
                return;
            }
            
            if (password === confirm) {
                matchDiv.innerHTML = '<span style="color: #28a745;">✅ Les mots de passe correspondent</span>';
            } else {
                matchDiv.innerHTML = '<span style="color: #dc3545;">❌ Les mots de passe ne correspondent pas</span>';
            }
        }
        
        function inscrire() {
            var nom_boutique = document.getElementById('nom_boutique').value.trim();
            var proprietaire_nom = document.getElementById('proprietaire_nom').value.trim();
            var proprietaire_prenom = document.getElementById('proprietaire_prenom').value.trim();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var confirm = document.getElementById('confirm_password').value;
            var telephone = document.getElementById('telephone').value;
            var adresse = document.getElementById('adresse').value;
            
            if (!nom_boutique || !proprietaire_nom || !proprietaire_prenom || !email || !password) {
                showError('Veuillez remplir tous les champs obligatoires *');
                return;
            }
            
            if (password.length < 8) {
                showError('Le mot de passe doit contenir au moins 8 caractères');
                return;
            }
            
            if (password !== confirm) {
                showError('Les mots de passe ne correspondent pas');
                return;
            }
            
            fetch('/api/inscrire_boutique', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nom_boutique: nom_boutique,
                    proprietaire_nom: proprietaire_nom,
                    proprietaire_prenom: proprietaire_prenom,
                    email: email,
                    password: password,
                    telephone: telephone,
                    adresse: adresse
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showSuccess(data.message);
                    setTimeout(() => {
                        window.location.href = '/login_page';
                    }, 2000);
                } else {
                    showError(data.error);
                }
            });
        }
        
        function showError(msg) {
            var div = document.getElementById('errorMsg');
            div.innerHTML = msg;
            div.style.display = 'block';
            setTimeout(() => { div.style.display = 'none'; }, 3000);
        }
        
        function showSuccess(msg) {
            var div = document.getElementById('successMsg');
            div.innerHTML = msg;
            div.style.display = 'block';
        }
    </script>
</body>
</html>
