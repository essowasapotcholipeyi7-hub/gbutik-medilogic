<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBoutik-MediLogic - Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .interface-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .interface-buttons button {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            background: #f5f5f5;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .interface-buttons button.selected {
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            color: white;
            border-color: transparent;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .error-msg {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏪 GBoutik-MediLogic</h1>
        
        <div id="errorMsg" class="error-msg"></div>
        
        <div class="interface-buttons">
            <button id="caisseBtn" onclick="selectInterface('caisse')">💰 Interface Caisse</button>
            <button id="gerantBtn" onclick="selectInterface('gerant')">👑 Interface Gérant</button>
        </div>
        
        <div id="caisseForm">
            <div class="form-group">
                <label>👤 Nom d'utilisateur</label>
                <input type="text" id="username" placeholder="vendeur1">
            </div>
            <div class="form-group">
                <label>🔑 Mot de passe</label>
                <input type="password" id="password" placeholder="vendeur123">
            </div>
        </div>
        
        <div id="gerantForm" style="display: none;">
            <div class="form-group">
                <label>🔑 Mot de passe gérant</label>
                <input type="password" id="mdpGerant" placeholder="admin123">
            </div>
        </div>
        
        <button type="submit" onclick="validerConnexion()">Se connecter</button>
    </div>
    
    <script>
        let selectedInterface = 'caisse';
        
        function selectInterface(interface) {
            selectedInterface = interface;
            
            const caisseBtn = document.getElementById('caisseBtn');
            const gerantBtn = document.getElementById('gerantBtn');
            const caisseForm = document.getElementById('caisseForm');
            const gerantForm = document.getElementById('gerantForm');
            
            if (interface === 'caisse') {
                caisseBtn.classList.add('selected');
                gerantBtn.classList.remove('selected');
                caisseForm.style.display = 'block';
                gerantForm.style.display = 'none';
            } else {
                caisseBtn.classList.remove('selected');
                gerantBtn.classList.add('selected');
                caisseForm.style.display = 'none';
                gerantForm.style.display = 'block';
            }
        }
        
        function validerConnexion() {
            const errorDiv = document.getElementById('errorMsg');
            
            if (selectedInterface === 'caisse') {
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                if (!username || !password) {
                    errorDiv.innerHTML = '❌ Veuillez saisir vos identifiants';
                    errorDiv.style.display = 'block';
                    return;
                }
                
                fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password, interface: 'caisse' })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = '/dashboard';
                    } else {
                        errorDiv.innerHTML = '❌ Identifiants incorrects';
                        errorDiv.style.display = 'block';
                    }
                });
            } else {
                const mdp = document.getElementById('mdpGerant').value;
                
                if (!mdp) {
                    errorDiv.innerHTML = '❌ Veuillez saisir le mot de passe';
                    errorDiv.style.display = 'block';
                    return;
                }
                
                fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'gerant', password: mdp, interface: 'gerant' })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = '/dashboard';
                    } else {
                        errorDiv.innerHTML = '❌ Mot de passe incorrect';
                        errorDiv.style.display = 'block';
                    }
                });
            }
        }
        
        // Sélection par défaut
        selectInterface('caisse');
    </script>
</body>
</html>
