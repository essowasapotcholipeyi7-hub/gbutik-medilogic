<div class="card">
  <h2>💬 Messagerie - Vendeur</h2>
  <div id="messageResult"></div>
  
  <div class="chat-container" style="height: 500px; display: flex; flex-direction: column; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden;">
    <div class="chat-messages" id="chatMessages" style="flex:1; overflow-y: auto; padding: 15px; background: #f8fafc;">
      <div style="text-align: center; color: #999;">Chargement des messages...</div>
    </div>
    <div style="padding: 15px; background: white; border-top: 1px solid #e5e7eb; display: flex; gap: 10px;">
      <textarea id="messageInput" rows="2" placeholder="Écrivez votre message..." style="flex:1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; resize: none;"></textarea>
      <button onclick="envoyerMessage()" style="background: #1e3a8a; color: white; border: none; border-radius: 8px; padding: 10px 20px;">📤 Envoyer</button>
    </div>
  </div>
</div>

<style>
  .chat-messages { display: flex; flex-direction: column; gap: 10px; }
  .message { max-width: 70%; padding: 10px 15px; border-radius: 18px; }
  .message.vendeur { align-self: flex-end; background: #1e3a8a; color: white; border-bottom-right-radius: 4px; }
  .message.gerant { align-self: flex-start; background: #e5e7eb; color: #333; border-bottom-left-radius: 4px; }
  .message-info { font-size: 10px; margin-top: 5px; opacity: 0.7; }
</style>

<script>
  let vendeurNom = sessionStorage.getItem('user_nom') || prompt('Entrez votre nom:', 'Vendeur');
  let intervalId = null;
  
  function chargerMessages() {
    fetch('/api/getMessagesByVendeur?vendeur=' + encodeURIComponent(vendeurNom))
      .then(response => response.json())
      .then(messages => {
        var container = document.getElementById('chatMessages');
        if (!messages || messages.length === 0) {
          container.innerHTML = '<div style="text-align: center; color: #999;">📭 Aucun message</div>';
          return;
        }
        var html = '';
        messages.forEach(function(m) {
          var estVendeur = (m.de === vendeurNom);
          var classe = estVendeur ? 'vendeur' : 'gerant';
          var nom = estVendeur ? 'Moi' : (m.de || 'Gérant');
          html += '<div class="message ' + classe + '">';
          html += '<div><strong>' + nom + '</strong></div>';
          html += '<div>' + escapeHtml(m.message || '') + '</div>';
          html += '<div class="message-info">' + (m.heure || '') + ' ' + (m.date || '') + '</div>';
          html += '</div>';
        });
        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
      });
  }
  
  function envoyerMessage() {
    var message = document.getElementById('messageInput').value.trim();
    if (!message) return;
    fetch('/api/envoyerMessage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: message, expediteur: vendeurNom })
    })
    .then(response => response.json())
    .then(data => {
      document.getElementById('messageInput').value = '';
      chargerMessages();
    });
  }
  
  function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
  }
  
  chargerMessages();
  intervalId = setInterval(chargerMessages, 10000);
</script>
