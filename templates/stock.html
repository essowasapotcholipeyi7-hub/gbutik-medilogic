<div class="card">
  <h2>📦 État du stock</h2>
  <div id="stockMessage"></div>

  <div class="stats">
    <div class="stat-card"><h3 id="nbProduits">0</h3><p>Produits en stock</p></div>
    <div class="stat-card"><h3 id="valeurStock">0</h3><p>Valeur du stock</p></div>
    <div class="stat-card"><h3 id="alertesCount">0</h3><p>Alertes</p></div>
    <div class="stat-card"><h3 id="ruptureCount">0</h3><p>Ruptures</p></div>
  </div>

  <div style="margin: 20px 0; display: flex; gap: 10px;">
    <input type="text" id="searchInput" placeholder="🔍 Rechercher un produit..." style="flex:1; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
    <button onclick="rechercherProduit()" style="background:#1e3a8a; color:white; border:none; border-radius:8px; padding:10px 20px;">🔍</button>
    <button onclick="reinitialiserRecherche()" style="background:#6c757d; color:white; border:none; border-radius:8px; padding:10px 20px;">❌</button>
  </div>

  <div class="table-container">
    <table>
      <thead><tr><th>Produit</th><th>Stock initial</th><th>Entrées</th><th>Sorties</th><th>Stock restant</th><th>Seuil</th><th>Statut</th></tr></thead>
      <tbody id="stockBody"><tr><td colspan="7">Chargement...</td></tr></tbody>
    </table>
  </div>
  <button onclick="chargerStock()" style="margin-top:15px; background:#17a2b8; color:white; border:none; border-radius:8px; padding:10px 20px;">🔄 Actualiser</button>
</div>

<style>
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
  .stat-card { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); color: white; padding: 15px; border-radius: 15px; text-align: center; }
  .stat-card h3 { font-size: 24px; }
  .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid #e5e7eb; max-height: 400px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #1e3a8a; color: white; padding: 10px; position: sticky; top: 0; }
  td { padding: 8px 10px; border-bottom: 1px solid #e5e7eb; }
  .alert-low { background-color: #fff3cd; color: #856404; font-weight: bold; }
  .alert-out { background-color: #f8d7da; color: #721c24; font-weight: bold; }
</style>

<script>
  let tousProduits = [];
  
  function chargerStock() {
    fetch('/api/getStockComplet')
      .then(response => response.json())
      .then(data => {
        tousProduits = data.stock || [];
        document.getElementById('nbProduits').innerHTML = data.nbProduits || 0;
        document.getElementById('valeurStock').innerHTML = (data.valeurStock || 0).toLocaleString() + ' FCFA';
        document.getElementById('alertesCount').innerHTML = data.alertes || 0;
        document.getElementById('ruptureCount').innerHTML = data.ruptures || 0;
        afficherStock(tousProduits);
      });
  }
  
  function afficherStock(produits) {
    var tbody = document.getElementById('stockBody');
    tbody.innerHTML = '';
    if (produits.length === 0) { tbody.innerHTML = '<tr><td colspan="7">Aucun produit</td></tr>'; return; }
    
    produits.forEach(function(p) {
      var row = tbody.insertRow();
      var stock = p.stock || 0;
      var seuil = p.seuil || 0;
      var statut = stock <= 0 ? '🔴 RUPTURE' : (stock <= seuil ? '⚠️ ALERTE' : '✅ OK');
      var classe = stock <= 0 ? 'alert-out' : (stock <= seuil ? 'alert-low' : '');
      
      row.insertCell(0).innerHTML = '<strong>' + (p.nom || '-') + '</strong>';
      row.insertCell(1).textContent = (p.stockInitial || 0).toLocaleString();
      row.insertCell(2).textContent = (p.entrees || 0).toLocaleString();
      row.insertCell(3).textContent = (p.sorties || 0).toLocaleString();
      row.insertCell(4).innerHTML = '<strong>' + stock.toLocaleString() + '</strong>';
      row.insertCell(5).textContent = seuil;
      var cellStatut = row.insertCell(6);
      cellStatut.textContent = statut;
      if (classe) cellStatut.className = classe;
    });
  }
  
  function rechercherProduit() {
    var terme = document.getElementById('searchInput').value.toLowerCase();
    if (!terme) { afficherStock(tousProduits); return; }
    var filtres = tousProduits.filter(function(p) { return p.nom && p.nom.toLowerCase().includes(terme); });
    afficherStock(filtres);
  }
  
  function reinitialiserRecherche() {
    document.getElementById('searchInput').value = '';
    afficherStock(tousProduits);
  }
  
  chargerStock();
  setInterval(chargerStock, 60000);
</script>
