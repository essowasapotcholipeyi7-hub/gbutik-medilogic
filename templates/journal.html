<div class="card">
  <h2>📓 Journal des mouvements</h2>
  <div id="journalMessage"></div>

  <div class="table-container">
    <table>
      <thead><tr><th>Date</th><th>Heure</th><th>Type</th><th>Produit</th><th>Qté</th><th>Stock avant</th><th>Stock après</th><th>Utilisateur</th></tr></thead>
      <tbody id="journalBody"><tr><td colspan="8">Chargement...</td></tr></tbody>
    </table>
  </div>
  <button onclick="chargerJournal()" style="margin-top:15px; background:#17a2b8; color:white; border:none; border-radius:8px; padding:10px 20px;">🔄 Actualiser</button>
</div>

<style>
  .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid #e5e7eb; max-height: 500px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #1e3a8a; color: white; padding: 12px; position: sticky; top: 0; }
  td { padding: 8px 10px; border-bottom: 1px solid #e5e7eb; }
</style>

<script>
  function chargerJournal() {
    fetch('/api/getJournalMouvements')
      .then(response => response.json())
      .then(data => {
        var tbody = document.getElementById('journalBody');
        tbody.innerHTML = '';
        if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="8">Aucun mouvement</td></tr>'; return; }
        data.forEach(function(m) {
          var row = tbody.insertRow();
          row.insertCell(0).textContent = m.date || '';
          row.insertCell(1).textContent = m.heure || '';
          row.insertCell(2).innerHTML = '<span style="background:#e0e7ff; padding:2px 8px; border-radius:12px;">' + (m.type || '-') + '</span>';
          row.insertCell(3).textContent = m.produit || '';
          row.insertCell(4).textContent = m.quantite || 0;
          row.insertCell(5).textContent = (m.stockAvant || 0).toLocaleString();
          row.insertCell(6).textContent = (m.stockApres || 0).toLocaleString();
          row.insertCell(7).textContent = m.utilisateur || '';
        });
      });
  }
  chargerJournal();
  setInterval(chargerJournal, 30000);
</script>
