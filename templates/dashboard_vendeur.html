<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GBoutik-MediLogic — Espace Vendeur</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Effet de fond */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(45,212,191,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      margin: 0 auto;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s ease;
      animation: fadeIn 0.6s ease-out;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Icône utilisateur */
    .user-avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #2dd4bf, #0ea5e9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
      box-shadow: 0 0 30px rgba(45,212,191,0.3);
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.85rem;
      margin-bottom: 30px;
      letter-spacing: 0.05em;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 60px;
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      color: #e2e8f0;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
    }

    .menu-item:hover {
      background: rgba(45, 212, 191, 0.15);
      border-color: rgba(45, 212, 191, 0.4);
      color: #2dd4bf;
      transform: translateX(8px);
    }

    /* Couleurs spécifiques pour chaque lien */
    .menu-item.vente:hover {
      background: rgba(16, 185, 129, 0.15);
      border-color: rgba(16, 185, 129, 0.4);
      color: #10b981;
    }

    .menu-item.caisse:hover {
      background: rgba(245, 158, 11, 0.15);
      border-color: rgba(245, 158, 11, 0.4);
      color: #f59e0b;
    }

    .menu-item.messages:hover {
      background: rgba(139, 92, 246, 0.15);
      border-color: rgba(139, 92, 246, 0.4);
      color: #a855f7;
    }

    .menu-item.deconnexion:hover {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.4);
      color: #f87171;
    }

    /* Icônes dans les liens */
    .menu-icon {
      font-size: 1.2rem;
    }

    /* Footer */
    .footer-info {
      margin-top: 30px;
      font-size: 0.7rem;
      color: #475569;
      letter-spacing: 0.05em;
    }

    /* Version mobile */
    @media (max-width: 480px) {
      .card {
        padding: 30px 20px;
      }
      h2 {
        font-size: 1.4rem;
      }
      .user-avatar {
        width: 65px;
        height: 65px;
        font-size: 32px;
      }
      .menu-item {
        padding: 12px 16px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="user-avatar">
      👤
    </div>
    <h2>Bonjour, {{ session.user_nom if session.user_nom else 'Vendeur' }}</h2>
    <div class="subtitle">Espace de travail</div>

    <div class="menu">
      <a href="/vente_boutique" class="menu-item vente">
        <span class="menu-icon">💰</span>
        <span>Vente</span>
      </a>
      <a href="/caisse_journaliere" class="menu-item caisse">
        <span class="menu-icon">📊</span>
        <span>Caisse journalière</span>
      </a>
      <a href="/messages_vendeur" class="menu-item messages">
        <span class="menu-icon">💬</span>
        <span>Messages</span>
      </a>
      <a href="/deconnexion" class="menu-item deconnexion">
        <span class="menu-icon">🔓</span>
        <span>Déconnexion</span>
      </a>
    </div>

    <div class="footer-info">
      GBoutik-MediLogic · v2.0
    </div>
  </div>
</body>
</html>
