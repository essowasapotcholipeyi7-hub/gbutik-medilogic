<div class="card">
    <!-- En-tête avec bouton retour -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap;">
        <h2>📋 Catalogue - {{ session.boutique_nom if session.boutique_nom else 'Ma boutique' }}</h2>
        <a href="/dashboard_boutique" style="background:#6c757d; color:white; padding:8px 20px; border-radius:8px; text-decoration:none;">
            ← Retour
        </a>
    </div>
    
    <div id="catalogueMessage"></div>
    
    <div style="margin: 20px 0; display: flex; gap: 10px;">
        <input type="text" id="searchInput" placeholder="🔍 Rechercher..." style="flex:1; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
        <button onclick="rechercher()" style="background:#1e3a8a; color:white; border:none; border-radius:8px; padding:10px 20px; cursor:pointer;">🔍</button>
        <button onclick="reinitialiser()" style="background:#6c757d; color:white; border:none; border-radius:8px; padding:10px 20px; cursor:pointer;">❌</button>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th><th>Nom</th><th>Catégorie</th><th>Prix achat</th><th>Prix vente</th><th>Stock</th><th>Seuil</th><th>Action</th>
                </tr>
            </thead>
            <tbody id="catalogueBody">
                <tr><td colspan="8">Chargement...<\/td><\/tr>
            </tbody>
        </table>
    </div>
    
    <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: space-between;">
        <button onclick="ouvrirModalAjout()" style="background:#28a745; color:white; border:none; border-radius:8px; padding:10px 20px; cursor:pointer;">➕ Ajouter un produit</button>
        <button onclick="chargerCatalogue()" style="background:#17a2b8; color:white; border:none; border-radius:8px; padding:10px 20px; cursor:pointer;">🔄 Actualiser</button>
    </div>
</div>

<!-- Modal Ajout -->
<div id="modalAjout" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:20px; padding:25px; width:90%; max-width:500px;">
        <h3>➕ Ajouter un produit</h3>
        <input type="text" id="modalNom" placeholder="Nom *" style="width:100%; margin:10px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="text" id="modalCategorie" placeholder="Catégorie" style="width:100%; margin:10px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" id="modalPrixAchat" placeholder="Prix achat *" style="width:100%; margin:10px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" id="modalPrixVente" placeholder="Prix vente *" style="width:100%; margin:10px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" id="modalStock" placeholder="Stock initial" style="width:100%; margin:10px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" id="modalSeuil" placeholder="Seuil alerte" style="width:100%; margin:10px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="ajouterProduit()" style="background:#28a745; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">✅ Ajouter</button>
            <button onclick="fermerModal()" style="background:#6c757d; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">❌ Annuler</button>
        </div>
    </div>
</div>

<style>
    .table-container {
        overflow-x: auto;
        border-radius: 12px;
        border: 1px solid #e5e7eb;
        max-height: 500px;
        overflow-y: auto;
    }
    table {
        width: 100%;
        border-collapse: collapse;
    }
    th {
        background: #1e3a8a;
        color: white;
        padding: 12px;
        position: sticky;
        top: 0;
    }
    td {
        padding: 10px 12px;
        border-bottom: 1px solid #e5e7eb;
    }
    .card {
        max-width: 1200px;
        margin: 20px auto;
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    h2 {
        color: #1e3a8a;
        margin: 0;
    }
    @media (max-width: 768px) {
        .card h2 {
            font-size: 18px;
        }
        th, td {
            font-size: 12px;
            padding: 6px;
        }
    }
</style>

<script>
    let tousProduits = [];
    
    function chargerCatalogue() {
        fetch('/api/get_produits')
            .then(response => response.json())
            .then(data => {
                tousProduits = data;
                afficher(data);
            });
    }
    
    function afficher(produits) {
        var tbody = document.getElementById('catalogueBody');
        tbody.innerHTML = '';
        if (produits.length === 0) { 
            tbody.innerHTML = '<tr><td colspan="8">Aucun produit<\/td><\/tr>'; 
            return; 
        }
        
        produits.forEach(function(p) {
            var row = tbody.insertRow();
            row.insertCell(0).textContent = p.id || '-';
            row.insertCell(1).innerHTML = '<strong>' + (p.nom || '-') + '</strong>';
            row.insertCell(2).textContent = p.categorie || '-';
            row.insertCell(3).textContent = (p.prixAchat || 0).toLocaleString() + ' FCFA';
            row.insertCell(4).innerHTML = '<span style="color:#28a745; font-weight:bold;">' + (p.prixVente || 0).toLocaleString() + ' FCFA</span>';
            row.insertCell(5).textContent = (p.stock || 0).toLocaleString();
            row.insertCell(6).textContent = p.seuil || 0;
            
            var btn = document.createElement('button');
            btn.textContent = '🗑️ Supprimer';
            btn.style = 'background:#dc3545; color:white; border:none; border-radius:5px; padding:5px 10px; cursor:pointer;';
            btn.onclick = (function(nom) {
                return function() { supprimerProduit(nom); };
            })(p.nom);
            row.insertCell(7).appendChild(btn);
        });
    }
    
    function supprimerProduit(nom) {
        if (!confirm(`⚠️ Êtes-vous sûr de vouloir supprimer "${nom}" ?\n\nCette action est irréversible !`)) {
            return;
        }
        
        fetch('/api/supprimer_produit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nom: nom })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                document.getElementById('catalogueMessage').innerHTML = '<div style="background:#d4edda; padding:10px; border-radius:8px;">✅ ' + data.message + '</div>';
                chargerCatalogue();
                setTimeout(() => { document.getElementById('catalogueMessage').innerHTML = ''; }, 3000);
            } else {
                alert('Erreur: ' + data.error);
            }
        });
    }
    
    function rechercher() {
        var terme = document.getElementById('searchInput').value.toLowerCase();
        if (!terme) { 
            afficher(tousProduits); 
            return; 
        }
        var filtres = tousProduits.filter(p => p.nom && p.nom.toLowerCase().includes(terme));
        afficher(filtres);
    }
    
    function reinitialiser() {
        document.getElementById('searchInput').value = '';
        afficher(tousProduits);
    }
    
    function ouvrirModalAjout() {
        document.getElementById('modalAjout').style.display = 'flex';
    }
    
    function fermerModal() {
        document.getElementById('modalAjout').style.display = 'none';
    }
    
    function ajouterProduit() {
        var produit = {
            nom: document.getElementById('modalNom').value,
            categorie: document.getElementById('modalCategorie').value,
            prixAchat: parseFloat(document.getElementById('modalPrixAchat').value),
            prixVente: parseFloat(document.getElementById('modalPrixVente').value),
            stock: parseInt(document.getElementById('modalStock').value) || 0,
            seuil: parseInt(document.getElementById('modalSeuil').value) || 10
        };
        
        fetch('/api/ajouter_produit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(produit)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert(data.message);
                fermerModal();
                chargerCatalogue();
                document.getElementById('modalNom').value = '';
                document.getElementById('modalCategorie').value = '';
                document.getElementById('modalPrixAchat').value = '';
                document.getElementById('modalPrixVente').value = '';
                document.getElementById('modalStock').value = '';
                document.getElementById('modalSeuil').value = '';
            } else {
                alert('Erreur: ' + data.error);
            }
        });
    }
    
    chargerCatalogue();
</script>
