<div class="card">
    <!-- En-tête avec bouton retour -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap;">
        <h2>📋 Catalogue - {{ session.boutique_nom if session.boutique_nom else 'Ma boutique' }}</h2>
        <a href="/dashboard_boutique" style="background:#6c757d; color:white; padding:8px 20px; border-radius:8px; text-decoration:none;">
            ← Retour
        </a>
    </div>
    
    <div id="catalogueMessage"></div>
    
    <div style="margin: 20px 0; display: flex; gap: 10px;">
        <input type="text" id="searchInput" placeholder="🔍 Rechercher..." style="flex:1; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
        <button onclick="rechercher()" style="background:#1e3a8a; color:white; border:none; border-radius:8px; padding:10px 20px; cursor:pointer;">🔍</button>
        <button onclick="reinitialiser()" style="background:#6c757d; color:white; border:none; border-radius:8px; padding:10px 20px; cursor:pointer;">❌</button>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th><th>Nom</th><th>Catégorie</th><th>Prix achat</th><th>Prix vente</th><th>Stock</th><th>Seuil</th><th>Action</th>
                </tr>
            </thead>
            <tbody id="catalogueBody">
                <tr><td colspan="8">Chargement...</td></tr>
            </tbody>
        </table>
    </div>
    
    <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: space-between;">
        <button onclick="ouvrirModalAjout()" style="background:#28a745; color:white; border:none; border-radius:8px; padding:10px 20px; cursor:pointer;">➕ Ajouter un produit</button>
        <button onclick="imprimerCatalogue()" style="background:#6f42c1; color:white; border:none; border-radius:8px; padding:10px 20px; cursor:pointer;">🖨️ Imprimer le catalogue</button>
    </div>
        <button onclick="chargerCatalogue()" style="background:#17a2b8; color:white; border:none; border-radius:8px; padding:10px 20px; cursor:pointer;">🔄 Actualiser</button>
    </div>
</div>

<!-- ========== MODAL AJOUT ========== -->
<div id="modalAjout" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:20px; padding:25px; width:90%; max-width:500px;">
        <h3>➕ Ajouter un produit</h3>
        <input type="text" id="modalNom" placeholder="Nom *" style="width:100%; margin:10px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="text" id="modalCategorie" placeholder="Catégorie" style="width:100%; margin:10px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" id="modalPrixAchat" placeholder="Prix achat (optionnel)" style="width:100%; margin:10px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" id="modalPrixVente" placeholder="Prix vente *" style="width:100%; margin:10px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" id="modalStock" placeholder="Stock initial" style="width:100%; margin:10px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" id="modalSeuil" placeholder="Seuil alerte" style="width:100%; margin:10px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button id="btnAjouterSave" onclick="ajouterProduit()" style="background:#28a745; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">✅ Ajouter</button>
            <button onclick="fermerModal()" style="background:#6c757d; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">❌ Annuler</button>
        </div>
    </div>
</div>

<!-- ========== MODAL MODIFIER ========== -->
<div id="modalEdit" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:20px; padding:25px; width:90%; max-width:500px;">
        <h3>✏️ Modifier le produit</h3>
        <input type="hidden" id="editId">
        <input type="text" id="editNom" placeholder="Nom *" style="width:100%; margin:10px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="text" id="editCategorie" placeholder="Catégorie" style="width:100%; margin:10px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" id="editPrixAchat" placeholder="Prix achat (optionnel)" style="width:100%; margin:10px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" id="editPrixVente" placeholder="Prix vente *" style="width:100%; margin:10px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" id="editStock" placeholder="Stock" style="width:100%; margin:10px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <input type="number" id="editSeuil" placeholder="Seuil alerte" style="width:100%; margin:10px 0; padding:10px; border:1px solid #ddd; border-radius:8px;">
        <div id="editMessage" style="display:none; padding:10px; border-radius:8px; margin:10px 0;"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button id="btnEditSave" onclick="enregistrerModification()" style="flex:1; background:#28a745; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">💾 Enregistrer</button>
            <button onclick="fermerEditModal()" style="flex:1; background:#6c757d; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">❌ Annuler</button>
        </div>
    </div>
</div>

<style>
    .table-container {
        overflow-x: auto;
        border-radius: 12px;
        border: 1px solid #e5e7eb;
        max-height: 500px;
        overflow-y: auto;

        border-collapse: collapse;

</style>

<script>
    let tousProduits = [];
    
    // ========== CHARGER LE CATALOGUE ==========
    function chargerCatalogue() {
        fetch('/api/get_produits')
            .then(response => response.json())
            .then(data => {
                tousProduits = data;
                afficher(data);
            });
    }
    
    // ========== AFFICHER LES PRODUITS ==========
    function afficher(produits) {
        var tbody = document.getElementById('catalogueBody');
        tbody.innerHTML = '';
        if (produits.length === 0) { 
            tbody.innerHTML = '<tr><td colspan="8">Aucun produit</td></tr>'; 
            return; 
        }
        
        produits.forEach(function(p) {
            var row = tbody.insertRow();
            row.insertCell(0).textContent = p.id || '-';
            row.insertCell(1).innerHTML = '<strong>' + (p.nom || '-') + '</strong>';
            row.insertCell(2).textContent = p.categorie || '-';
            row.insertCell(3).textContent = (p.prixAchat || 0).toLocaleString() + ' FCFA';
            row.insertCell(4).innerHTML = '<span style="color:#28a745; font-weight:bold;">' + (p.prixVente || 0).toLocaleString() + ' FCFA</span>';
            row.insertCell(5).textContent = (p.stock || 0).toLocaleString();
            row.insertCell(6).textContent = p.seuil || 0;
            
            // ✅ Colonne Action avec Modifier + Supprimer
            var actionsCell = row.insertCell(7);
            actionsCell.innerHTML = `
                <button class="btn-modifier" onclick="openEditModal('${p.id}')">✏️ Modifier</button>
                <button class="btn-supprimer" onclick="supprimerProduit('${p.nom}')">🗑️</button>
            `;
        });
    }
    
    // ========== RECHERCHER ==========
    function rechercher() {
        var terme = document.getElementById('searchInput').value.toLowerCase();
        if (!terme) { 
            afficher(tousProduits); 
            return; 
        }
        var filtres = tousProduits.filter(p => p.nom && p.nom.toLowerCase().includes(terme));
        afficher(filtres);
    }
    
    function reinitialiser() {
        document.getElementById('searchInput').value = '';
        afficher(tousProduits);
    }
    
    // ========== AJOUTER UN PRODUIT ==========
    function ouvrirModalAjout() {
        document.getElementById('modalAjout').style.display = 'flex';
        document.getElementById('modalNom').value = '';
        document.getElementById('modalCategorie').value = '';
        document.getElementById('modalPrixAchat').value = '';
        document.getElementById('modalPrixVente').value = '';
        document.getElementById('modalStock').value = '';
        document.getElementById('modalSeuil').value = '';
    }
    
function fermerModal() {
    // ✅ RÉACTIVER LE BOUTON
    var btn = document.getElementById('btnAjouterSave');
    if (btn) {
        btn.disabled = false;
        btn.innerHTML = '✅ Ajouter';
        btn.style.opacity = '1';
        btn.style.cursor = 'pointer';
    }
    
    // Cacher le modal
    document.getElementById('modalAjout').style.display = 'none';
}
    
function ajouterProduit() {
    var nom = document.getElementById('modalNom').value.trim();
    var categorie = document.getElementById('modalCategorie').value.trim();
    var prixAchat = parseFloat(document.getElementById('modalPrixAchat').value);
    var prixVente = parseFloat(document.getElementById('modalPrixVente').value);
    var stock = parseInt(document.getElementById('modalStock').value) || 0;
    var seuil = parseInt(document.getElementById('modalSeuil').value) || 10;
    
    // Validation
    if (!nom) {
        alert('Le nom du produit est obligatoire');
        return;
    }
    if (!prixAchat || prixAchat <= 0) {
        prixAchat = 0;
    }

    if (!prixVente || prixVente <= 0) {
        alert('Le prix de vente est obligatoire et doit être supérieur à 0');
        return;
    }
    
    // ✅ DÉSACTIVER LE BOUTON
    var btn = document.getElementById('btnAjouterSave');
    if (btn) {
        btn.disabled = true;
        btn.innerHTML = '⏳ Ajout en cours...';
        btn.style.opacity = '0.6';
        btn.style.cursor = 'not-allowed';
    }
    
    var msgDiv = document.getElementById('ajoutMessage');
    if (!msgDiv) {
        // Créer le message si inexistant
        var modal = document.querySelector('#modalAjout > div');
        var newMsg = document.createElement('div');
        newMsg.id = 'ajoutMessage';
        newMsg.style.display = 'none';
        newMsg.style.padding = '10px';
        newMsg.style.borderRadius = '8px';
        newMsg.style.margin = '10px 0';
        modal.insertBefore(newMsg, modal.querySelector('div:last-child'));
        msgDiv = newMsg;
    }
    
    msgDiv.style.display = 'block';
    msgDiv.innerHTML = '⏳ Ajout du produit en cours...';
    msgDiv.style.background = '#d1ecf1';
    msgDiv.style.color = '#0c5460';
    
    var produit = {
        nom: nom,
        categorie: categorie,
        prixAchat: prixAchat,
        prixVente: prixVente,
        stock: stock,
        seuil: seuil
    };
    
    fetch('/api/ajouter_produit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(produit)
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            msgDiv.innerHTML = '✅ ' + data.message;
            msgDiv.style.background = '#d4edda';
            msgDiv.style.color = '#155724';
            
            // Réinitialiser le formulaire
            document.getElementById('modalNom').value = '';
            document.getElementById('modalCategorie').value = '';
            document.getElementById('modalPrixAchat').value = '';
            document.getElementById('modalPrixVente').value = '';
            document.getElementById('modalStock').value = '';
            document.getElementById('modalSeuil').value = '';
            
            // Fermer le modal après 1.5 secondes
            setTimeout(function() {
                fermerModal();
                chargerCatalogue();
                var msg = document.getElementById('catalogueMessage');
                if (msg) {
                    msg.innerHTML = '<div style="background:#d4edda; padding:10px; border-radius:8px;">✅ ' + data.message + '</div>';
                    setTimeout(function() { msg.innerHTML = ''; }, 3000);
                }
            }, 1500);
            
        } else {
            msgDiv.innerHTML = '❌ ' + data.error;
            msgDiv.style.background = '#f8d7da';
            msgDiv.style.color = '#721c24';
            
            // ✅ RÉACTIVER LE BOUTON EN CAS D'ERREUR
            if (btn) {
                btn.disabled = false;
                btn.innerHTML = '✅ Ajouter';
                btn.style.opacity = '1';
                btn.style.cursor = 'pointer';
            }
        }
    })
    .catch(function(error) {
        msgDiv.innerHTML = '❌ Erreur réseau: ' + error;
        msgDiv.style.background = '#f8d7da';
        msgDiv.style.color = '#721c24';
        
        // ✅ RÉACTIVER LE BOUTON EN CAS D'ERREUR
        if (btn) {
            btn.disabled = false;
            btn.innerHTML = '✅ Ajouter';
            btn.style.opacity = '1';
            btn.style.cursor = 'pointer';
        }
    });
}

    // ========== SUPPRIMER UN PRODUIT ==========
    function supprimerProduit(nom) {
        if (!confirm(`⚠️ Êtes-vous sûr de vouloir supprimer "${nom}" ?\n\nCette action est irréversible !`)) {
            return;
        }
        
        fetch('/api/supprimer_produit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nom: nom })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                document.getElementById('catalogueMessage').innerHTML = '<div style="background:#d4edda; padding:10px; border-radius:8px;">✅ ' + data.message + '</div>';
                chargerCatalogue();
                setTimeout(() => { document.getElementById('catalogueMessage').innerHTML = ''; }, 3000);
            } else {
                alert('Erreur: ' + data.error);
            }
        });
    }
    
    // ========== MODIFIER UN PRODUIT ==========
    function openEditModal(produitId) {
        var produit = tousProduits.find(p => p.id === produitId);
        if (!produit) {
            alert('Produit non trouvé');
            return;
        }
        
        document.getElementById('editId').value = produit.id;
        document.getElementById('editNom').value = produit.nom || '';
        document.getElementById('editCategorie').value = produit.categorie || '';
        document.getElementById('editPrixAchat').value = produit.prixAchat || 0;
        document.getElementById('editPrixVente').value = produit.prixVente || 0;
        document.getElementById('editStock').value = produit.stock || 0;
        document.getElementById('editSeuil').value = produit.seuil || 10;
        
        document.getElementById('editMessage').style.display = 'none';
        document.getElementById('modalEdit').style.display = 'flex';
        
        // Réactiver le bouton si désactivé
        var btn = document.getElementById('btnEditSave');
        if (btn) {
            btn.disabled = false;
            btn.innerHTML = '💾 Enregistrer';
        }
    }
    
    function fermerEditModal() {
        document.getElementById('modalEdit').style.display = 'none';
    }
    
    function enregistrerModification() {
        var id = document.getElementById('editId').value;
        var nom = document.getElementById('editNom').value.trim();
        var categorie = document.getElementById('editCategorie').value.trim();
        var prixAchat = parseFloat(document.getElementById('editPrixAchat').value);
        var prixVente = parseFloat(document.getElementById('editPrixVente').value) || 0;
        var stock = parseInt(document.getElementById('editStock').value) || 0;
        var seuil = parseInt(document.getElementById('editSeuil').value) || 10;
        
        // Validation
        if (!nom) {
            alert('Le nom du produit est obligatoire');
            return;
        }
        // ✅ Prix d'achat optionnel - on met 0 si vide
        if (!prixAchat || prixAchat <= 0) {
            prixAchat = 0;
        }
        if (prixVente <= 0) {
            alert('Le prix de vente doit être supérieur à 0');
            return;
        }
        
        var msgDiv = document.getElementById('editMessage');
        msgDiv.style.display = 'block';
        msgDiv.innerHTML = '⏳ Enregistrement en cours...';
        msgDiv.style.background = '#d1ecf1';
        msgDiv.style.color = '#0c5460';
        
        // Désactiver le bouton
        var btn = document.getElementById('btnEditSave');
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '⏳ Enregistrement...';
        }
        
        fetch('/api/modifier_produit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                id: id,
                nom: nom,
                categorie: categorie,
                prixAchat: prixAchat,
                prixVente: prixVente,
                stock: stock,
                seuil: seuil
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                msgDiv.innerHTML = '✅ ' + data.message;
                msgDiv.style.background = '#d4edda';
                msgDiv.style.color = '#155724';
                
                setTimeout(function() {
                    fermerEditModal();
                    chargerCatalogue();
                    document.getElementById('catalogueMessage').innerHTML = '<div style="background:#d4edda; padding:10px; border-radius:8px;">✅ ' + data.message + '</div>';
                    setTimeout(() => { document.getElementById('catalogueMessage').innerHTML = ''; }, 3000);
                }, 1500);
            } else {
                msgDiv.innerHTML = '❌ ' + data.error;
                msgDiv.style.background = '#f8d7da';
                msgDiv.style.color = '#721c24';
                
                // Réactiver le bouton en cas d'erreur
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '💾 Enregistrer';
                }
            }
        })
        .catch(function(error) {
            msgDiv.innerHTML = '❌ Erreur réseau: ' + error;
            msgDiv.style.background = '#f8d7da';
            msgDiv.style.color = '#721c24';
            
            if (btn) {
                btn.disabled = false;
                btn.innerHTML = '💾 Enregistrer';
            }
        });
    }
function imprimerCatalogue() {
    // Récupérer les produits
    fetch('/api/get_produits')
        .then(response => response.json())
        .then(data => {
            if (data.length === 0) {
                alert('Le catalogue est vide');
                return;
            }
            
            // Créer le contenu à imprimer
            var contenu = `
            <!DOCTYPE html>
            <html>
            <head>
                <meta charset="UTF-8">
                <title>Catalogue - {{ session.boutique_nom if session.boutique_nom else 'Ma boutique' }}</title>
                <style>
                    * { margin: 0; padding: 0; box-sizing: border-box; }
                    body {
                        font-family: 'Segoe UI', Arial, sans-serif;
                        padding: 30px;
                        background: white;
                    }
                    .entete {
                        text-align: center;
                        margin-bottom: 30px;
                        padding-bottom: 20px;
                        border-bottom: 3px solid #1e3a8a;
                    }
                    .entete h1 {
                        color: #1e3a8a;
                        font-size: 28px;
                        margin-bottom: 5px;
                    }
                    .entete h2 {
                        color: #555;
                        font-size: 16px;
                        font-weight: normal;
                    }
                    .entete .date {
                        color: #888;
                        font-size: 13px;
                        margin-top: 5px;
                    }
                    table {
                        width: 100%;
                        border-collapse: collapse;
                        margin-top: 20px;
                    }
                    th {
                        background: #1e3a8a;
                        color: white;
                        padding: 12px 10px;
                        text-align: left;
                        font-size: 13px;
                        text-transform: uppercase;
                    }
                    td {
                        padding: 10px;
                        border-bottom: 1px solid #e5e7eb;
                        font-size: 13px;
                    }
                    tr:hover {
                        background: #f8f9fa;
                    }
                    .total {
                        margin-top: 20px;
                        padding: 15px;
                        background: #f0f4ff;
                        border-radius: 8px;
                        text-align: right;
                        font-size: 14px;
                        border: 1px solid #d0ddf0;
                    }
                    .total span {
                        font-weight: bold;
                        color: #1e3a8a;
                    }
                    .footer {
                        margin-top: 30px;
                        padding-top: 20px;
                        border-top: 1px solid #ddd;
                        text-align: center;
                        font-size: 12px;
                        color: #888;
                    }
                    .status-stock {
                        display: inline-block;
                        padding: 2px 10px;
                        border-radius: 20px;
                        font-size: 11px;
                        font-weight: bold;
                    }
                    .status-stock.suffisant { background: #d4edda; color: #155724; }
                    .status-stock.alerte { background: #fff3cd; color: #856404; }
                    .status-stock.rupture { background: #f8d7da; color: #721c24; }
                    
                    @media print {
                        body { padding: 20px; }
                        .no-print { display: none; }
                        tr:hover { background: transparent; }
                    }
                </style>
            </head>
            <body>
                <div class="entete">
                    <h1>📋 CATALOGUE DES PRODUITS</h1>
                    <h2>{{ session.boutique_nom if session.boutique_nom else 'Ma boutique' }}</h2>
                    <div class="date">Imprimé le : ${new Date().toLocaleDateString('fr-FR')} à ${new Date().toLocaleTimeString('fr-FR')}</div>
                </div>
                
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nom du produit</th>
                            <th>Catégorie</th>
                            <th>Prix Achat</th>
                            <th>Prix Vente</th>
                            <th>Stock</th>
                            <th>Seuil</th>
                            <th>Statut</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            data.forEach(function(p, index) {
                var stock = p.stock || 0;
                var seuil = p.seuil || 10;
                var statut = '';
                var statutClass = '';
                
                if (stock <= 0) {
                    statut = 'RUPTURE';
                    statutClass = 'rupture';
                } else if (stock <= seuil) {
                    statut = 'ALERTE';
                    statutClass = 'alerte';
                } else {
                    statut = 'OK';
                    statutClass = 'suffisant';
                }
                
                contenu += `
                    <tr>
                        <td>${index + 1}</td>
                        <td><strong>${p.nom || '-'}</strong></td>
                        <td>${p.categorie || '-'}</td>
                        <td>${(p.prixAchat || 0).toLocaleString()} FCFA</td>
                        <td><strong style="color:#28a745;">${(p.prixVente || 0).toLocaleString()} FCFA</strong></td>
                        <td>${stock}</td>
                        <td>${seuil}</td>
                        <td><span class="status-stock ${statutClass}">${statut}</span></td>
                    </tr>
                `;
            });
            
            // Calcul des totaux
            var totalProduits = data.length;
            var totalStock = data.reduce((sum, p) => sum + (p.stock || 0), 0);
            var totalValeur = data.reduce((sum, p) => sum + ((p.stock || 0) * (p.prixVente || 0)), 0);
            var totalAchat = data.reduce((sum, p) => sum + ((p.stock || 0) * (p.prixAchat || 0)), 0);
            var enAlerte = data.filter(p => (p.stock || 0) <= (p.seuil || 10) && (p.stock || 0) > 0).length;
            var enRupture = data.filter(p => (p.stock || 0) <= 0).length;
            
            contenu += `
                    </tbody>
                </table>
                
                <div class="total">
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; text-align: center;">
                        <div>
                            <div style="font-size: 12px; color: #666;">📦 Total produits</div>
                            <div style="font-size: 20px; font-weight: bold; color: #1e3a8a;">${totalProduits}</div>
                        </div>
                        <div>
                            <div style="font-size: 12px; color: #666;">📊 Stock total</div>
                            <div style="font-size: 20px; font-weight: bold; color: #17a2b8;">${totalStock}</div>
                        </div>
                        <div>
                            <div style="font-size: 12px; color: #666;">💰 Valeur stock (vente)</div>
                            <div style="font-size: 20px; font-weight: bold; color: #28a745;">${totalValeur.toLocaleString()} FCFA</div>
                        </div>
                        <div>
                            <div style="font-size: 12px; color: #666;">💰 Valeur stock (achat)</div>
                            <div style="font-size: 20px; font-weight: bold; color: #ffc107;">${totalAchat.toLocaleString()} FCFA</div>
                        </div>
                        <div>
                            <div style="font-size: 12px; color: #666;">⚠️ En alerte</div>
                            <div style="font-size: 20px; font-weight: bold; color: #856404;">${enAlerte}</div>
                        </div>
                        <div>
                            <div style="font-size: 12px; color: #666;">🚫 En rupture</div>
                            <div style="font-size: 20px; font-weight: bold; color: #dc3545;">${enRupture}</div>
                        </div>
                    </div>
                </div>
                
                <div class="footer">
                    <p>📋 Catalogue généré automatiquement - GBoutik-MediLogic</p>
                    <p>🔒 Document confidentiel - Usage interne</p>
                </div>
                
                <script>
                    window.onload = function() {
                        window.print();
                        setTimeout(function() { window.close(); }, 1000);
                    };
                <\/script>
            </body>
            </html>
            `;
            
            // Ouvrir une nouvelle fenêtre pour l'impression
            var printWindow = window.open('', '_blank', 'width=1000,height=800');
            printWindow.document.write(contenu);
            printWindow.document.close();
        })
        .catch(function(error) {
            alert('Erreur lors du chargement du catalogue: ' + error);
        });
}
    
    // ========== INITIALISATION ==========
    chargerCatalogue();
</script>
